<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechSchool Course Exporter</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .loading-spinner {
            border: 4px solid rgba(0, 0, 0, 0.1);
            border-radius: 50%;
            border-top: 4px solid #3b82f6;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .course-card {
            transition: all 0.3s ease;
        }
        
        .course-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }
        
        .download-btn {
            display: none;
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <div class="container mx-auto px-4 py-8">
        <!-- Header -->
        <header class="mb-10 text-center">
            <h1 class="text-4xl font-bold text-indigo-700 mb-2">TechSchool Course Exporter</h1>
            <p class="text-gray-600 max-w-2xl mx-auto">Manage and export your courses with a single click</p>
        </header>
        
        <!-- Main Content -->
        <main>
            <!-- Search Section -->
            <div class="mb-8">
                <div class="relative w-full md:w-96">
                    <input type="text" id="searchInput" placeholder="Search courses..." 
                           class="w-full pl-10 pr-4 py-2 rounded-lg border border-gray-300 focus:outline-none focus:ring-2 focus:ring-indigo-500">
                    <i class="fas fa-search absolute left-3 top-3 text-gray-400"></i>
                </div>
            </div>
            
            <!-- Status Messages -->
            <div id="statusMessage" class="hidden mb-6 p-4 rounded-lg"></div>
            
            <!-- Loading Indicator -->
            <div id="loadingIndicator" class="flex justify-center items-center py-10">
                <div class="loading-spinner"></div>
                <span class="ml-3 text-gray-600">Loading courses...</span>
            </div>
            
            <!-- Courses List -->
            <div id="coursesContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <!-- Courses will be populated here by JavaScript -->
            </div>
            
            <!-- No Courses Message -->
            <div id="noCoursesMessage" class="hidden text-center py-10">
                <i class="fas fa-book-open text-5xl text-gray-300 mb-4"></i>
                <h3 class="text-xl font-semibold text-gray-600">No courses found</h3>
                <p class="text-gray-500">Try adjusting your search</p>
            </div>
        </main>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const apiBaseUrl = 'https://techschool.es/webservice/rest/server.php';
            const token = '0cf732cd21f7ed950f5f0346e7a2a58b';
            
            const coursesContainer = document.getElementById('coursesContainer');
            const loadingIndicator = document.getElementById('loadingIndicator');
            const noCoursesMessage = document.getElementById('noCoursesMessage');
            const statusMessage = document.getElementById('statusMessage');
            const searchInput = document.getElementById('searchInput');
            
            let allCourses = [];
            
            // Fetch courses from API
            async function fetchCourses() {
                try {
                    loadingIndicator.classList.remove('hidden');
                    coursesContainer.innerHTML = '';
                    noCoursesMessage.classList.add('hidden');
                    
                    const params = new URLSearchParams();
                    params.append('wstoken', token);
                    params.append('wsfunction', 'local_oneclickexport_list_courses');
                    params.append('moodlewsrestformat', 'json');
                    
                    const response = await fetch(`${apiBaseUrl}?${params.toString()}`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/x-www-form-urlencoded',
                        },
                    });
                    
                    if (!response.ok) {
                        throw new Error('Failed to fetch courses');
                    }
                    
                    const data = await response.json();
                    
                    if (data.exception) {
                        throw new Error(data.message);
                    }
                    
                    allCourses = Array.isArray(data) ? data : [];
                    
                    if (allCourses.length === 0) {
                        noCoursesMessage.classList.remove('hidden');
                    } else {
                        renderCourses(allCourses);
                    }
                } catch (error) {
                    showStatusMessage(`Error: ${error.message}`, 'error');
                    console.error('Error fetching courses:', error);
                } finally {
                    loadingIndicator.classList.add('hidden');
                }
            }
            
            // Render courses to the DOM
            function renderCourses(courses) {
                coursesContainer.innerHTML = '';
                
                if (courses.length === 0) {
                    noCoursesMessage.classList.remove('hidden');
                    return;
                }
                
                noCoursesMessage.classList.add('hidden');
                
                courses.forEach(course => {
                    const courseCard = document.createElement('div');
                    courseCard.className = 'course-card bg-white rounded-xl shadow-md overflow-hidden hover:shadow-lg';
                    courseCard.id = `course-${course.id}`;
                    
                    courseCard.innerHTML = `
                        <div class="p-6">
                            <div class="flex justify-between items-start mb-4">
                                <h3 class="text-xl font-semibold text-gray-800">${course.fullname || course.shortname}</h3>
                                <span class="px-3 py-1 text-xs font-medium rounded-full bg-green-100 text-green-800">
                                    Available
                                </span>
                            </div>
                            
                            <div class="flex items-center text-gray-600 text-sm mb-4">
                                <i class="fas fa-id-card mr-2"></i>
                                <span>ID: ${course.id}</span>
                            </div>
                            
                            <div class="flex justify-between items-center">
                                <span class="text-sm font-medium text-indigo-600">${course.shortname || 'No shortname'}</span>
                                <div class="flex items-center">
                                    <button onclick="exportCourse(${course.id}, '${(course.fullname || course.shortname).replace(/'/g, "\\'")}')" 
                                            class="export-btn px-4 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 transition-colors flex items-center">
                                        <i class="fas fa-file-export mr-2"></i> Export
                                    </button>
                                    <a href="#" class="download-btn ml-2 px-4 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700 transition-colors flex items-center" target="_blank">
                                        <i class="fas fa-download mr-2"></i> Download
                                    </a>
                                </div>
                            </div>
                        </div>
                    `;
                    
                    coursesContainer.appendChild(courseCard);
                });
            }
            
            // Export a course
            window.exportCourse = async function(courseId, courseName) {
                try {
                    // Get the course card and buttons
                    const courseCard = document.getElementById(`course-${courseId}`);
                    const exportBtn = courseCard.querySelector('.export-btn');
                    const downloadBtn = courseCard.querySelector('.download-btn');
                    
                    // Show loading state
                    exportBtn.disabled = true;
                    exportBtn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i> Exporting...';
                    
                    showStatusMessage(`Exporting course "${courseName}"...`, 'info');
                    
                    const params = new URLSearchParams();
                    params.append('wstoken', token);
                    params.append('wsfunction', 'local_oneclickexport_export_course');
                    params.append('moodlewsrestformat', 'json');
                    params.append('courseid', courseId);
                    
                    const response = await fetch(`${apiBaseUrl}?${params.toString()}`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/x-www-form-urlencoded',
                        },
                    });
                    
                    if (!response.ok) {
                        throw new Error('Failed to export course');
                    }
                    
                    const data = await response.json();
                    
                    if (data.exception) {
                        throw new Error(data.message);
                    }
                    
                    if (data.status !== 'success') {
                        throw new Error(data.message || 'Export failed');
                    }
                    
                    // Show download button
                    downloadBtn.href = data.downloadurl;
                    downloadBtn.style.display = 'flex';
                    downloadBtn.innerHTML = `<i class="fas fa-download mr-2"></i> Download (${formatFileSize(data.filesize)})`;
                    
                    showStatusMessage(`Successfully exported "${courseName}"`, 'success');
                    
                } catch (error) {
                    showStatusMessage(`Error exporting course: ${error.message}`, 'error');
                    console.error('Error exporting course:', error);
                } finally {
                    const exportBtn = document.querySelector(`#course-${courseId} .export-btn`);
                    if (exportBtn) {
                        exportBtn.disabled = false;
                        exportBtn.innerHTML = '<i class="fas fa-file-export mr-2"></i> Export';
                    }
                }
            };
            
            // Format file size in human readable format
            function formatFileSize(bytes) {
                if (!bytes || bytes === 0) return '0 Bytes';
                const k = 1024;
                const sizes = ['Bytes', 'KB', 'MB', 'GB'];
                const i = Math.floor(Math.log(bytes) / Math.log(k));
                return parseFloat((bytes / Math.pow(k, i)).toFixed(1)) + ' ' + sizes[i];
            }
            
            // Show status message
            function showStatusMessage(message, type) {
                statusMessage.textContent = message;
                statusMessage.className = ''; // Reset classes
                
                const baseClasses = 'mb-6 p-4 rounded-lg flex items-center';
                let typeClasses = '';
                
                switch (type) {
                    case 'success':
                        typeClasses = 'bg-green-100 text-green-800';
                        statusMessage.innerHTML = `<i class="fas fa-check-circle mr-2"></i> ${message}`;
                        break;
                    case 'error':
                        typeClasses = 'bg-red-100 text-red-800';
                        statusMessage.innerHTML = `<i class="fas fa-exclamation-circle mr-2"></i> ${message}`;
                        break;
                    case 'info':
                        typeClasses = 'bg-blue-100 text-blue-800';
                        statusMessage.innerHTML = `<i class="fas fa-info-circle mr-2"></i> ${message}`;
                        break;
                    default:
                        typeClasses = 'bg-gray-100 text-gray-800';
                }
                
                statusMessage.className = `${baseClasses} ${typeClasses}`;
                statusMessage.classList.remove('hidden');
                
                // Auto-hide after 5 seconds
                setTimeout(() => {
                    statusMessage.classList.add('hidden');
                }, 5000);
            }
            
            // Filter courses based on search
            function filterCourses() {
                const searchTerm = searchInput.value.toLowerCase();
                const filteredCourses = allCourses.filter(course => {
                    const nameMatch = course.fullname?.toLowerCase().includes(searchTerm) || 
                                     course.shortname?.toLowerCase().includes(searchTerm);
                    return nameMatch;
                });
                
                renderCourses(filteredCourses);
            }
            
            // Event listeners
            searchInput.addEventListener('input', filterCourses);
            
            // Initialize the page
            fetchCourses();
        });
    </script>
</body>
</html>
